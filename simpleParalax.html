<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .container{
            position: relative;
            background-color: #111;
            height: 100vh;
            overflow: hidden;
        }
        .gambar{
            width: 100%;
            height: 100%;
            position: absolute;
            left: 0;
            top: 0;
            object-fit: cover;
        }

        .baner {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .baner h1 {
            position: relative;
            font-size: 9em;
            color: white;
            font-family: 'Poppin',sans-serif;
        }
    </style>
</head>
<body>
    <div class="container">

        <div class="baner">
            <img src="star/1.png" data-speed="-0.1" class="gambar">
            <img src="star/2.png" data-speed="-0.1" class="gambar">
            <img src="star/3.png" data-speed="-0.1" class="gambar">
            <img src="star/4.png" data-speed="0.01" class="gambar">
            <img src="star/5.png" data-speed="-0.01" class="gambar">
            <img src="star/6.png" data-speed="-0.1" class="gambar">
            <img src="star/7.png" data-speed="0.01" class="gambar">
            <img src="star/8.png" data-speed="0.1" class="gambar">
            <img src="star/9.png" data-speed="-0.1" class="gambar">
            <img src="star/10.png" data-speed="0.1" class="gambar">
            <img src="star/11.png" data-speed="-0.1" class="gambar">
            <img src="star/12.png" data-speed="0.1" class="gambar">
            <h1>Parallax</h1>
        </div>

    </div>

    <script>
        let container = document.querySelector('.container')

        container.addEventListener('mousemove',function(e){
            
            this.querySelectorAll('.gambar').forEach(element => {
                
            let speed = element.getAttribute('data-speed')

            let x = (e.clientX * speed)   
            let y = (e.clientY * speed)

            element.style.transform = `translate(${x}px,${y}px)`
            });
        })
    </script>
</body>
</html>
